spring.application.name=review-ai-app

# MySQL Database Configuration
spring.datasource.url=jdbc:mysql://localhost:3306/review_ai_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA & Hibernate Configuration
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Logging
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE

# Server Configuration
server.port=2204
server.servlet.context-path=/api

# Spring Boot Actuator (optional, for monitoring)
management.endpoints.web.exposure.include=health,info

# Logging
logging.level.org.springframework.web=DEBUG
logging.level.com.review.ai.app=DEBUG

