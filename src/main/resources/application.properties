# ============================================================
# COMMON CONFIGURATION (Shared across all environments)
# ============================================================

# Application name
spring.application.name=review-ai-app

# ============================================================
# DATABASE COMMON CONFIG
# ============================================================
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ============================================================
# JPA COMMON CONFIG
# ============================================================
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.jdbc.lob.non_contextual_creation=true

# ============================================================
# JACKSON CONFIGURATION
# ============================================================
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.time-zone=UTC

# ============================================================
# ACTUATOR / MONITORING
# ============================================================
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=always

# ============================================================
# API DOCUMENTATION (Swagger)
# ============================================================
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.enabled=true

# ============================================================
# AI CONFIGURATION - Pollinations AI (FREE)
# ============================================================
# Pollinations AI API endpoint (FREE, no API key required)
app.ai.pollinations.url=https://gen.pollinations.ai/v1/chat/completions
app.ai.pollinations.model=openai
app.ai.pollinations.temperature=0.7
app.ai.pollinations.max-tokens=200

# Enable/disable AI features
app.ai.enabled=true
app.ai.mock=true

# ============================================================
# ENVIRONMENT PROFILE
# ============================================================
# Set active profile: dev, qa, or prod
spring.profiles.active=dev

# ============================================================
# DEFAULT CONFIGURATION (Overridden by profile-specific files)
# ============================================================

# Logging
logging.level.com.review.ai.app=INFO
logging.level.org.springframework.web=INFO

# JPA Defaults
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true